<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Font Explorer — Google Fonts</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #fafafa;
            color: #1a1a1a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 3rem 1.5rem;
        }

        h1 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .subtitle {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 2rem;
        }

        /* ── Preview area ──────────────────────────── */

        .preview {
            width: 100%;
            max-width: 900px;
            text-align: center;
            padding: 4rem 2rem;
            margin-bottom: 2rem;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            background: #fff;
            transition: opacity 0.15s ease;
        }

        .preview__text {
            font-size: 3.5rem;
            line-height: 1.2;
            word-break: break-word;
            transition: font-family 0.1s ease;
        }

        .preview__fontname {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: #999;
            font-family: monospace;
            letter-spacing: 0.03em;
        }

        .preview__category {
            font-size: 0.7rem;
            color: #bbb;
            margin-top: 0.25rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        /* ── Controls ───────────────────────────────── */

        .controls {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .controls button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: #fff;
            font-size: 1.25rem;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
            color: #333;
        }

        .controls button:hover {
            background: #f0f0f0;
            border-color: #ccc;
        }

        .controls button:active {
            background: #e4e4e4;
        }

        .counter {
            font-size: 0.85rem;
            color: #666;
            min-width: 100px;
            text-align: center;
            font-variant-numeric: tabular-nums;
        }

        /* ── Editable preview text ─────────────────── */

        .edit-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            width: 100%;
            max-width: 900px;
        }

        .edit-row label {
            font-size: 0.8rem;
            color: #888;
            white-space: nowrap;
        }

        .edit-row input[type="text"] {
            flex: 1;
            padding: 0.5rem 0.75rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.15s;
        }

        .edit-row input[type="text"]:focus {
            border-color: #999;
        }

        .edit-row input[type="number"] {
            width: 80px;
            padding: 0.5rem 0.75rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.15s;
        }

        .edit-row input[type="number"]:focus {
            border-color: #999;
        }

        /* ── Search / filter ───────────────────────── */

        .search-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
            width: 100%;
            max-width: 900px;
        }

        .search-row input {
            flex: 1;
            padding: 0.5rem 0.75rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.15s;
        }

        .search-row input:focus {
            border-color: #999;
        }

        .search-row select {
            padding: 0.5rem 0.75rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.9rem;
            background: #fff;
            outline: none;
            cursor: pointer;
        }

        /* ── Status ─────────────────────────────────── */

        .status {
            font-size: 0.8rem;
            color: #aaa;
            margin-top: 1rem;
        }

        .status.error {
            color: #cc0000;
        }

        /* ── Keyboard hint ─────────────────────────── */

        .hint {
            font-size: 0.75rem;
            color: #bbb;
            margin-top: 0.5rem;
        }

        kbd {
            display: inline-block;
            padding: 0.1em 0.4em;
            font-size: 0.75rem;
            font-family: monospace;
            background: #f0f0f0;
            border: 1px solid #ddd;
            border-radius: 3px;
        }

        /* ── Copy button ───────────────────────────── */

        .copy-btn {
            padding: 0.4rem 1rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            background: #fff;
            font-size: 0.8rem;
            cursor: pointer;
            color: #555;
            transition: background 0.15s, border-color 0.15s;
        }

        .copy-btn:hover {
            background: #f0f0f0;
            border-color: #ccc;
        }
    </style>
</head>

<body>

    <h1>Font Explorer</h1>
    <p class="subtitle">Browse Google Fonts live</p>

    <!-- Search and filter -->
    <div class="search-row">
        <input type="text" id="searchInput" placeholder="Search fonts…" autocomplete="off">
        <select id="categoryFilter">
            <option value="all">All Categories</option>
            <option value="serif">Serif</option>
            <option value="sans-serif">Sans-Serif</option>
            <option value="display">Display</option>
            <option value="handwriting">Handwriting</option>
            <option value="monospace">Monospace</option>
        </select>
    </div>

    <!-- Editable preview text and size -->
    <div class="edit-row">
        <label for="previewText">Preview:</label>
        <input type="text" id="previewText" value="Hartmann-Schröder">
        <label for="fontSize">Size:</label>
        <input type="number" id="fontSize" value="56" min="12" max="200" step="2">
    </div>

    <!-- Preview -->
    <div class="preview" id="preview">
        <div class="preview__text" id="previewDisplay">Hartmann-Schröder</div>
        <div class="preview__fontname" id="fontName">Loading…</div>
        <div class="preview__category" id="fontCategory"></div>
    </div>

    <!-- Navigation -->
    <div class="controls">
        <button id="prevBtn" title="Previous font" aria-label="Previous font">←</button>
        <span class="counter" id="counter">— / —</span>
        <button id="nextBtn" title="Next font" aria-label="Next font">→</button>
        <button class="copy-btn" id="copyBtn" title="Copy font name">Copy Name</button>
    </div>

    <p class="hint">Use <kbd>←</kbd> <kbd>→</kbd> arrow keys to browse</p>
    <p class="status" id="status"></p>

    <script>
        const METADATA_URL = 'https://fonts.google.com/metadata/fonts';

        let allFonts = [];
        let filteredFonts = [];
        let currentIndex = 0;
        const loadedFonts = new Set();

        // DOM refs
        const previewDisplay = document.getElementById('previewDisplay');
        const fontNameEl = document.getElementById('fontName');
        const fontCategoryEl = document.getElementById('fontCategory');
        const counterEl = document.getElementById('counter');
        const statusEl = document.getElementById('status');
        const searchInput = document.getElementById('searchInput');
        const categoryFilter = document.getElementById('categoryFilter');
        const previewTextInput = document.getElementById('previewText');
        const fontSizeInput = document.getElementById('fontSize');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const copyBtn = document.getElementById('copyBtn');

        // ── Fetch font list ────────────────────────────
        async function fetchFonts() {
            statusEl.textContent = 'Fetching font list from Google Fonts…';
            statusEl.className = 'status';

            try {
                const res = await fetch(METADATA_URL);
                const text = await res.text();
                // Google's metadata endpoint returns JSON with a )]}' prefix
                const json = JSON.parse(text.replace(/^\)\]\}\'\n/, ''));

                allFonts = json.familyMetadataList.map(f => ({
                    family: f.family,
                    category: f.category ? f.category.toLowerCase() : 'sans-serif',
                }));

                allFonts.sort((a, b) => a.family.localeCompare(b.family));

                statusEl.textContent = `Loaded ${allFonts.length} fonts`;
                applyFilters();
                showFont(0);
            } catch (err) {
                statusEl.textContent = 'Failed to load fonts. Check your connection.';
                statusEl.className = 'status error';
                console.error(err);
            }
        }

        // ── Filter fonts ───────────────────────────────
        function applyFilters() {
            const query = searchInput.value.trim().toLowerCase();
            const cat = categoryFilter.value;

            filteredFonts = allFonts.filter(f => {
                const matchesSearch = !query || f.family.toLowerCase().includes(query);
                const matchesCat = cat === 'all' || f.category === cat;
                return matchesSearch && matchesCat;
            });

            currentIndex = 0;
            if (filteredFonts.length > 0) {
                showFont(0);
            } else {
                previewDisplay.style.fontFamily = '';
                fontNameEl.textContent = 'No fonts match';
                fontCategoryEl.textContent = '';
                counterEl.textContent = '0 / 0';
            }
        }

        // ── Load and show a font ───────────────────────
        function showFont(index) {
            if (filteredFonts.length === 0) return;

            currentIndex = ((index % filteredFonts.length) + filteredFonts.length) % filteredFonts.length;
            const font = filteredFonts[currentIndex];

            fontNameEl.textContent = font.family;
            fontCategoryEl.textContent = font.category;
            counterEl.textContent = `${currentIndex + 1} / ${filteredFonts.length}`;

            // Load the font via Google Fonts CSS API if not already loaded
            if (!loadedFonts.has(font.family)) {
                const link = document.createElement('link');
                link.rel = 'stylesheet';
                link.href = `https://fonts.googleapis.com/css2?family=${encodeURIComponent(font.family)}&display=swap`;
                document.head.appendChild(link);
                loadedFonts.add(font.family);
            }

            previewDisplay.style.fontFamily = `'${font.family}', ${font.category}`;
        }

        // ── Event listeners ────────────────────────────
        prevBtn.addEventListener('click', () => showFont(currentIndex - 1));
        nextBtn.addEventListener('click', () => showFont(currentIndex + 1));

        document.addEventListener('keydown', (e) => {
            // Don't intercept keystrokes when typing in inputs
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;

            if (e.key === 'ArrowLeft') {
                e.preventDefault();
                showFont(currentIndex - 1);
            } else if (e.key === 'ArrowRight') {
                e.preventDefault();
                showFont(currentIndex + 1);
            }
        });

        searchInput.addEventListener('input', applyFilters);
        categoryFilter.addEventListener('change', applyFilters);

        previewTextInput.addEventListener('input', () => {
            previewDisplay.textContent = previewTextInput.value || 'Hartmann-Schröder';
        });

        fontSizeInput.addEventListener('input', () => {
            const size = Math.max(12, Math.min(200, parseInt(fontSizeInput.value) || 56));
            previewDisplay.style.fontSize = size + 'px';
        });

        copyBtn.addEventListener('click', () => {
            if (filteredFonts.length === 0) return;
            const name = filteredFonts[currentIndex].family;
            navigator.clipboard.writeText(name).then(() => {
                copyBtn.textContent = 'Copied!';
                setTimeout(() => { copyBtn.textContent = 'Copy Name'; }, 1500);
            });
        });

        // ── Init ───────────────────────────────────────
        previewDisplay.style.fontSize = '56px';
        fetchFonts();
    </script>

</body>

</html>
